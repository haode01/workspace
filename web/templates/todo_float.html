<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <style>
        :root {
            --bg: #1a1b2e;
            --card: #232442;
            --border: rgba(255,255,255,.08);
            --accent: #6366f1;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --success: #22c55e;
            --warn: #f59e0b;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 13px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        /* 标题栏 — 可拖拽 */
        .float-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            flex-shrink: 0;
        }
        .float-header-title { font-size: 14px; font-weight: 700; }
        .float-header-count {
            background: var(--accent);
            color: #fff;
            font-size: 11px;
            padding: 1px 7px;
            border-radius: 10px;
            margin-left: 6px;
        }
        .float-header-actions {
            display: flex; gap: 4px;
            -webkit-app-region: no-drag;
        }
        .float-header-actions button {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 13px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .float-header-actions button:hover { color: var(--text); background: rgba(255,255,255,.08); }

        /* 输入区 */
        .float-add {
            display: flex;
            gap: 6px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .float-add input {
            flex: 1;
            background: rgba(255,255,255,.06);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 6px 10px;
            color: var(--text);
            font-size: 12px;
            outline: none;
        }
        .float-add input:focus { border-color: var(--accent); }
        .float-add input::placeholder { color: var(--muted); }
        .float-add select {
            background: rgba(255,255,255,.06);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            padding: 4px 6px;
            font-size: 11px;
            width: 50px;
            outline: none;
            cursor: pointer;
        }
        .float-add button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
        }
        .float-add button:hover { opacity: .85; }

        /* 任务列表 */
        .float-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px 8px;
        }
        .float-list::-webkit-scrollbar { width: 4px; }
        .float-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 2px; }

        .float-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 8px;
            border-radius: 6px;
            transition: background .12s;
            position: relative;
        }
        .float-item:hover { background: rgba(255,255,255,.04); }
        .float-item.pinned { border-left: 2px solid var(--accent); padding-left: 6px; }
        .float-item.completed .float-item-title { text-decoration: line-through; opacity: .5; }

        /* 复选框 */
        .float-check {
            width: 16px; height: 16px;
            border: 2px solid var(--muted);
            border-radius: 50%;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .15s;
        }
        .float-check:hover { border-color: var(--accent); }
        .float-check.done { background: var(--success); border-color: var(--success); }
        .float-check.done::after { content: '✓'; color: #fff; font-size: 10px; }

        .float-item-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 12.5px;
            cursor: default;
        }

        /* 优先级指示 */
        .float-pri {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .float-pri.p1 { background: var(--danger); }
        .float-pri.p2 { background: var(--warn); }
        .float-pri.p3 { background: var(--success); }

        /* 操作按钮 */
        .float-item-actions {
            display: none;
            gap: 2px;
        }
        .float-item:hover .float-item-actions { display: flex; }
        .float-item-actions button {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 12px;
            padding: 2px 4px;
            border-radius: 3px;
        }
        .float-item-actions button:hover { color: var(--text); background: rgba(255,255,255,.08); }

        .float-empty {
            text-align: center;
            padding: 30px 10px;
            color: var(--muted);
            font-size: 13px;
        }

        /* 底部状态 */
        .float-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 10px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
            flex-shrink: 0;
        }
        .float-footer a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
        }
        .float-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="float-header">
    <div>
        <span class="float-header-title">📋 待办事项</span>
        <span class="float-header-count" id="todo-count">0</span>
    </div>
    <div class="float-header-actions">
        <button onclick="loadTodos()" title="刷新">🔄</button>
    </div>
</div>

<div class="float-add">
    <input type="text" id="add-input" placeholder="添加新任务..." onkeydown="if(event.key==='Enter')addTodo()">
    <select id="add-priority">
        <option value="1">🔴</option>
        <option value="2" selected>🟡</option>
        <option value="3">🟢</option>
    </select>
    <button onclick="addTodo()">添加</button>
</div>

<div class="float-list" id="todo-list">
    <div class="float-empty">加载中...</div>
</div>

<div class="float-footer">
    <span id="footer-info"></span>
    <a onclick="window.open('http://localhost:8888/', '_blank')">打开主面板 →</a>
</div>

<script>
const API_BASE = '';  // same origin

async function api(path, opts = {}) {
    const r = await fetch(`/api${path}`, {
        headers: { 'Content-Type': 'application/json' },
        ...opts
    });
    return r.json();
}

let todos = [];

async function loadTodos() {
    try {
        todos = await api('/todos');
        renderTodos();
    } catch (e) {
        document.getElementById('todo-list').innerHTML =
            '<div class="float-empty">⚠ 连接失败，请确保主程序已启动</div>';
    }
}

function renderTodos() {
    const list = document.getElementById('todo-list');
    const pending = todos.filter(t => !t.completed);
    document.getElementById('todo-count').textContent = pending.length;
    document.getElementById('footer-info').textContent = `${pending.length} 项未完成`;

    if (!pending.length) {
        list.innerHTML = '<div class="float-empty">✨ 全部完成！</div>';
        return;
    }

    list.innerHTML = pending.map(t => `
        <div class="float-item ${t.pinned ? 'pinned' : ''} ${t.completed ? 'completed' : ''}">
            <div class="float-check ${t.completed ? 'done' : ''}" onclick="completeTodo(${t.id})"></div>
            <span class="float-pri p${t.priority}"></span>
            <span class="float-item-title" title="${esc(t.title)}">${esc(t.title)}</span>
            <div class="float-item-actions">
                <button onclick="pinTodo(${t.id})" title="${t.pinned ? '取消置顶' : '置顶'}">${t.pinned ? '📌' : '📍'}</button>
                <button onclick="deleteTodo(${t.id})" title="删除">🗑</button>
            </div>
        </div>
    `).join('');
}

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

async function addTodo() {
    const input = document.getElementById('add-input');
    const title = input.value.trim();
    if (!title) return;
    const priority = +document.getElementById('add-priority').value;
    await api('/todos', { method: 'POST', body: JSON.stringify({ title, priority }) });
    input.value = '';
    loadTodos();
}

async function completeTodo(id) {
    await api(`/todos/${id}/complete`, { method: 'POST' });
    loadTodos();
}

async function pinTodo(id) {
    await api(`/todos/${id}/pin`, { method: 'POST' });
    loadTodos();
}

async function deleteTodo(id) {
    await api(`/todos/${id}`, { method: 'DELETE' });
    loadTodos();
}

// 初始化 + 自动刷新
loadTodos();
setInterval(loadTodos, 30000);  // 每 30 秒自动刷新
</script>
</body>
</html>
